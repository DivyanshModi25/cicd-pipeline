name: Lint

on:
    workflow_call:
        inputs:
            app_directory:
                description: 'Directory of the application within the repository'
                required: false
                type: string
                default: '.'

jobs:
    lint:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ${{ inputs.app_directory }}

        steps:
            - name: Download prepared artifact
              uses: actions/download-artifact@v4
              with:
                name: prepared-source-artifact
                path: .

            - name: Cache lint packages
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-lint-v1
                restore-keys: |
                    ${{ runner.os }}-pip-lint-

            - name: Install linting tools
              run: |
                pip install ruff black

            - name: Run ruff linting
              continue-on-error: true
              run: |
                ruff check . || echo "::warning::Ruff linting failed"

            - name: Run black linting
              continue-on-error: true
              run: |
                black --check . || echo "::warning::Black formatting issues found"

            